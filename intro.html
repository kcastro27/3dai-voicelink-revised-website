<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DAi VoiceLink</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #050d1a;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
}

/* ── INTRO SCREEN ── */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center top, #0a1628 0%, #050d1a 70%);
  z-index: 100;
  opacity: 1;
  transition: opacity 0.8s ease;
}

/* ── CYAN GLOW RING ── */
.glow-ring {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  border: 1px solid rgba(0,212,255,0.08);
  box-shadow: 0 0 120px rgba(0,212,255,0.06);
  animation: pulse-ring 3s ease-in-out infinite;
  pointer-events: none;
}
.glow-ring:nth-child(2) {
  width: 800px; height: 800px;
  animation-delay: 0.5s;
  opacity: 0.5;
}
@keyframes pulse-ring {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.03); opacity: 1; }
}

/* ── LOGO/TITLE ── */
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 10;
  opacity: 0;
  transform: translateY(-20px);
  animation: fadeUp 1s ease forwards 0.4s;
}

.logo-wrap img.title-img {
  width: min(420px, 80vw);
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 24px rgba(0,212,255,0.5));
}

/* ── TAGLINE ── */
.tagline {
  font-family: 'Orbitron', monospace;
  font-size: clamp(10px, 1.5vw, 13px);
  letter-spacing: 4px;
  color: rgba(0,212,255,0.7);
  text-transform: uppercase;
  margin-top: 10px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 1s;
}

/* ── GRACE ── */
.grace-wrap {
  position: relative;
  z-index: 10;
  opacity: 0;
  transform: translateY(30px);
  animation: graceRise 1.2s ease forwards 1.2s;
  margin-top: -20px;
}

.grace-wrap img {
  height: min(420px, 55vh);
  width: auto;
  object-fit: contain;
  background: #ffffff;
  border-radius: 50% 50% 0 0 / 60% 60% 0 0;
  filter: drop-shadow(0 -20px 60px rgba(0,212,255,0.2));
}

/* ── SCAN LINE ── */
.scanline {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
  animation: scan 2.5s linear infinite;
  pointer-events: none;
  opacity: 0;
  animation-delay: 1.5s;
}
@keyframes scan {
  0% { top: 0; opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* ── ENTER BUTTON ── */
.enter-wrap {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 2.2s;
  z-index: 20;
  text-align: center;
}
.enter-btn {
  background: transparent;
  border: 1px solid rgba(0,212,255,0.5);
  color: #00d4ff;
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  letter-spacing: 3px;
  padding: 14px 40px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.3s ease;
  border-radius: 4px;
}
.enter-btn:hover {
  background: rgba(0,212,255,0.1);
  box-shadow: 0 0 30px rgba(0,212,255,0.3);
  letter-spacing: 5px;
}
.enter-hint {
  font-size: 11px;
  color: rgba(0,212,255,0.4);
  margin-top: 10px;
  letter-spacing: 2px;
}

/* ── CORNER ACCENTS ── */
.corner {
  position: absolute;
  width: 30px; height: 30px;
  opacity: 0.4;
}
.corner.tl { top: 20px; left: 20px; border-top: 2px solid #00d4ff; border-left: 2px solid #00d4ff; }
.corner.tr { top: 20px; right: 20px; border-top: 2px solid #00d4ff; border-right: 2px solid #00d4ff; }
.corner.bl { bottom: 20px; left: 20px; border-bottom: 2px solid #00d4ff; border-left: 2px solid #00d4ff; }
.corner.br { bottom: 20px; right: 20px; border-bottom: 2px solid #00d4ff; border-right: 2px solid #00d4ff; }

/* ── FLASH OVERLAY ── */
#flash {
  position: fixed;
  inset: 0;
  background: #00d4ff;
  opacity: 0;
  pointer-events: none;
  z-index: 200;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes graceRise {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="flash"></div>

<div id="intro">
  <!-- Corner accents -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Glow rings -->
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>

  <!-- Scan line -->
  <div class="scanline"></div>

  <!-- Title logo -->
  <div class="logo-wrap">
    <img class="title-img" src="site-images/fb-overlay-2.png" alt="3DAi VoiceLink">
    <div class="tagline">AI Voice Agent · 24/7 · Never Miss a Call</div>
  </div>

  <!-- Grace -->
  <div class="grace-wrap">
    <img src="site-images/freepik_a-realistic-horizontal-16_2819169085.jpg" alt="Grace">
  </div>

  <!-- Enter button -->
  <div class="enter-wrap">
    <button class="enter-btn" onclick="enterSite()">Enter</button>
    <div class="enter-hint">or wait to auto-enter</div>
  </div>
</div>

<script>
  // Auto-enter after 5 seconds
  let autoTimer = setTimeout(enterSite, 5000);

  function enterSite() {
    clearTimeout(autoTimer);
    const flash = document.getElementById('flash');
    const intro = document.getElementById('intro');

    // Flash effect
    flash.style.transition = 'opacity 0.15s ease';
    flash.style.opacity = '0.7';

    setTimeout(() => {
      flash.style.transition = 'opacity 0.3s ease';
      flash.style.opacity = '0';
      intro.style.opacity = '0';

      setTimeout(() => {
        window.location.href = 'mockup-v1.html';
      }, 800);
    }, 150);
  }
</script>

</body>
</html>
