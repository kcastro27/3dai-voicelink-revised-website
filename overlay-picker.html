<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Overlay Picker</title>
<style>
  body { background: #050d1a; font-family: sans-serif; padding: 40px; }
  h1 { color: #00d4ff; font-size: 18px; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .item { text-align: center; }
  .item img { width: 100%; border: 2px solid rgba(0,212,255,0.3); border-radius: 8px; background: #fff; }
  .item .label { color: #f9a825; font-weight: 700; font-size: 14px; margin-top: 10px; }

  /* Show on dark bg too */
  .dark-bg img { background: #050d1a; }
</style>
</head>
<body>
<h1>Facebook Brand Overlays — Pick Your Logo/Title (shown on white background)</h1>
<div class="grid">
  <div class="item"><img src="site-images/fb-overlay-1.png"><div class="label">Image 1</div></div>
  <div class="item"><img src="site-images/fb-overlay-2.png"><div class="label">Image 2</div></div>
  <div class="item"><img src="site-images/fb-overlay-3.png"><div class="label">Image 3</div></div>
  <div class="item"><img src="site-images/fb-overlay-4.png"><div class="label">Image 4</div></div>
</div>

<h1 style="margin-top:50px;">Same images on dark navy background</h1>
<div class="grid dark-bg">
  <div class="item"><img src="site-images/fb-overlay-1.png" style="background:#050d1a;"><div class="label">Image 1</div></div>
  <div class="item"><img src="site-images/fb-overlay-2.png" style="background:#050d1a;"><div class="label">Image 2</div></div>
  <div class="item"><img src="site-images/fb-overlay-3.png" style="background:#050d1a;"><div class="label">Image 3</div></div>
  <div class="item"><img src="site-images/fb-overlay-4.png" style="background:#050d1a;"><div class="label">Image 4</div></div>
</div>
</body>
</html>
